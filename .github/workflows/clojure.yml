name: Clojure CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Java and Clojure
        uses: DeLaGuardo/setup-clojure@13
        with:
          java-version: 21
          lein: 2.12.0

      - name: Install dependencies
        run: lein deps

      - name: Run standard tests
        run: lein test

      - name: Run generative tests
        run: lein test :generative

      - name: Run clj-kondo linter
        run: lein clj-kondo-lint
